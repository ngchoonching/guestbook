# LOCAL development. On Render you don't use this file — you create a managed
# PostgreSQL instance and link it (which provides DATABASE_URL), then deploy
# the web service from the Dockerfile.
#
#   docker compose up   ->  app at http://localhost:8080
#                           Adminer (DB browser) at http://localhost:8081
#
# Locally there's no SSL on the Postgres container, so DB_SSLMODE=disable.

services:
  web:
    build: .
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: guestbook
      DB_USER: appuser
      DB_PASS: apppass
      DB_SSLMODE: disable
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: guestbook
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  pgdata:
